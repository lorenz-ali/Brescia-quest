<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brescia Quest - Il Gioco Esplorativo</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* La mappa occupa tutto lo spazio rimanente sotto l'header e i filtri */
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        
        /* GERARCHIA LIVELLI (Z-INDEX) */
        #popup-scoperta, #popup-profilo { z-index: 10000 !important; }
        #wishlist-sidebar { z-index: 9000 !important; }
        #btn-wishlist { z-index: 8500 !important; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans flex flex-col h-screen overflow-hidden">

    <button id="btn-wishlist" onclick="toggleWishlist()" class="fixed bottom-6 right-6 md:bottom-auto md:top-36 md:right-6 bg-yellow-500 hover:bg-yellow-400 text-gray-950 font-bold p-4 rounded-full shadow-2xl transition-all cursor-pointer text-xl flex items-center justify-center hidden">
        📋 <span class="text-xs ml-1 font-bold">Wishlist</span>
    </button>

    <div id="wishlist-sidebar" class="fixed top-0 right-0 h-full w-72 bg-gray-950 border-l border-gray-800 transition-transform duration-300 ease-in-out overflow-y-auto p-6 shadow-2xl translate-x-full">
        <div class="flex justify-between items-center mb-6 mt-4">
            <h2 class="text-xl font-bold text-yellow-400">⚔️ La mia Wishlist</h2>
            <button onclick="toggleWishlist()" class="text-gray-400 hover:text-white text-sm cursor-pointer">Chiudi ✕</button>
        </div>
        <div id="lista-monumenti" class="space-y-3"></div>
    </div>

    <div id="schermata-login" class="fixed inset-0 bg-gray-950 z-50 flex flex-col justify-center items-center p-6">
        <div class="max-w-sm w-full bg-gray-800 p-6 rounded-2xl border-2 border-yellow-500 shadow-xl text-center">
            <span class="text-6xl animate-pulse">🎮</span>
            <h2 class="text-2xl font-bold text-yellow-400 mt-2">BRESCIA QUEST</h2>
            <p class="text-gray-400 text-xs mb-6">Crea il tuo Avatar e inizia l'avventura</p>
            
            <form id="form-login" onsubmit="gestisciLogin(event)" class="text-left space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Indirizzo Email</label>
                    <input type="email" id="login-email" required class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-sm focus:outline-none focus:border-yellow-400">
                </div>
                
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Password</label>
                    <input type="password" id="login-password" required minlength="6" placeholder="Minimo 6 caratteri" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-sm focus:outline-none focus:border-yellow-400">
                </div>
                
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Nome del Player</label>
                    <input type="text" id="login-nome" required minlength="3" maxlength="12" placeholder="Max 12 caratteri" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-sm focus:outline-none focus:border-yellow-400">
                </div>
                
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Seleziona Genere Avatar</label>
                    <select id="login-genere" required class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-sm focus:outline-none focus:border-yellow-400">
                        <option value="" disabled selected>Scegli il tuo genere...</option>
                        <option value="Esploratore">Esploratore 🧑‍🚀</option>
                        <option value="Esploratrice">Esploratrice 👩‍🚀</option>
                    </select>
                </div>
                
                <button type="submit" class="w-full bg-yellow-500 text-gray-950 font-bold py-3 rounded-xl shadow-lg hover:bg-yellow-400 transition-colors mt-4 cursor-pointer">
                    REGISTRATI / ACCEDI 🚀
                </button>
            </form>
        </div>
    </div>

    <div id="popup-profilo" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden">
        <div class="bg-gray-800 p-6 rounded-2xl max-w-sm w-full border-2 border-yellow-500 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-yellow-400">⚙️ Gestione Profilo</h3>
                <button onclick="chiudiPopupProfilo()" class="text-gray-400 hover:text-white text-lg cursor-pointer">✕</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Modifica Nome</label>
                    <input type="text" id="edit-nome" maxlength="12" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-sm focus:outline-none focus:border-yellow-400">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Modifica Genere Avatar</label>
                    <select id="edit-genere" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-sm focus:outline-none focus:border-yellow-400">
                        <option value="Esploratore">Esploratore 🧑‍🚀</option>
                        <option value="Esploratrice">Esploratrice 👩‍🚀</option>
                    </select>
                </div>
                
                <button onclick="salvaModificheProfilo()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-2 rounded-xl transition-colors cursor-pointer text-sm">
                    Salva Modifiche da Co-Pilota
                </button>
                
                <hr class="border-gray-700 my-2">
                
                <button onclick="eseguiLogout()" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-2 rounded-xl transition-colors cursor-pointer text-sm flex items-center justify-center gap-1">
                    🚪 Esci dal Gioco (Logout)
                </button>
            </div>
        </div>
    </div>

    <header class="bg-gray-800 p-4 shadow-lg flex justify-between items-center z-10">
        <div onclick="apriPopupProfilo()" class="flex items-center gap-2 cursor-pointer hover:bg-gray-700 p-1.5 rounded-xl transition-colors">
            <div id="avatar-icon" class="text-2xl bg-gray-700 p-1.5 rounded-full select-none">👤</div>
            <div>
                <h1 id="player-display-name" class="text-md font-bold text-yellow-400">Player</h1>
                <p id="player-display-role" class="text-xs text-gray-400">Esploratore Urbano</p>
            </div>
        </div>
        <div class="text-right">
            <div class="text-sm font-semibold text-green-400">LIVELLO: <span id="livello-txt">1</span></div>
            <div class="text-xs text-gray-300"><span id="xp-txt">0</span> / 300 XP</div>
            <div class="w-24 bg-gray-700 h-1.5 rounded-full mt-1 overflow-hidden">
                <div id="xp-bar" class="bg-green-500 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </header>

    <nav class="bg-gray-850 p-2 flex gap-2 justify-center z-10 border-b border-gray-800">
        <button onclick="filtraCategoria('tutti')" class="bg-gray-700 hover:bg-gray-600 text-xs font-bold px-3 py-1 rounded-full cursor-pointer">🌍 Tutti</button>
        <button onclick="filtraCategoria('monumento')" class="bg-amber-700 hover:bg-amber-600 text-xs font-bold px-3 py-1 rounded-full cursor-pointer">🏛️ Monumenti</button>
        <button onclick="filtraCategoria('parco')" class="bg-green-700 hover:bg-green-600 text-xs font-bold px-3 py-1 rounded-full cursor-pointer">🌳 Parchi</button>
        <button onclick="filtraCategoria('supermercato')" class="bg-blue-700 hover:bg-blue-600 text-xs font-bold px-3 py-1 rounded-full cursor-pointer">🛒 Spesa</button>
    </nav>

    <main id="map"></main>

    <div id="popup-scoperta" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden">
        <div class="bg-gray-800 p-6 rounded-2xl max-w-sm w-full text-center border-2 border-yellow-400 shadow-2xl">
            <span class="text-5xl">🏆</span>
            <h3 class="text-2xl font-bold text-yellow-400 mt-2">BADGE SBLOCCATO!</h3>
            <p id="popup-nome" class="text-xl font-semibold mt-1">Nome Posto</p>
            <p id="popup-desc" class="text-gray-300 text-sm mt-3 px-2"></p>
            <div class="mt-4 text-green-400 font-bold font-mono text-lg">+100 XP GUADAGNATI!</div>
            <button onclick="chiudiPopup()" class="mt-5 w-full bg-yellow-500 text-gray-950 font-bold py-2 rounded-xl cursor-pointer hover:bg-yellow-400">
                Continua la Caccia
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="monumenti.js"></script>
    <script src="app.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJeMeCgX5MfwWH8Dyok44d7XKacLGFiBc",
            authDomain: "brescia-quest-1ddda.firebaseapp.com",
            projectId: "brescia-quest-1ddda",
            storageBucket: "brescia-quest-1ddda.firebasestorage.app",
            messagingSenderId: "57771185253",
            appId: "1:57771185253:web:92273ba5ed320363a0228c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let utenteCorrenteId = null;
        let isLoggingIn = false;

        // --- GESTIONE REGISTRAZIONE E LOGIN ---
        window.gestisciLogin = async function(event) {
            event.preventDefault();
            if (isLoggingIn) return;
            isLoggingIn = true;
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const nome = document.getElementById('login-nome').value.trim();
            const genere = document.getElementById('login-genere').value;

            try {
                try {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    if (!user.emailVerified) {
                        alert("⚠️ Il tuo indirizzo email non è ancora stato verificato! Controlla la tua casella di posta (anche nello Spam).");
                        await auth.signOut();
                        isLoggingIn = false;
                        return;
                    }

                    caricaEAvviaGioco(user);

                } catch (loginError) {
                    if (loginError.code === 'auth/user-not-found' || loginError.code === 'auth/invalid-credential' || loginError.code === 'auth/wrong-password') {
                        
                        try {
                            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                            const user = userCredential.user;
                            
                            await sendEmailVerification(user);
                            
                            const statoMonumenti = (typeof monumenti !== 'undefined') ? monumenti.map(m => ({ nome: m.nome, scoperto: false })) : [];
                            await setDoc(doc(db, "utenti", user.uid), {
                                nome: nome,
                                genere: genere,
                                xp: 0,
                                livello: 1,
                                monumenti: statoMonumenti
                            });

                            alert("📧 Ti abbiamo inviato una mail di conferma! Clicca sul link ricevuto per attivare il tuo account e poi effettua l'accesso da questa schermata.");
                            await auth.signOut();
                            window.location.reload();
                        } catch (regError) {
                            alert("❌ Errore durante la registrazione: " + regError.message);
                            isLoggingIn = false;
                        }
                    } else {
                        alert("❌ Errore d'accesso: " + loginError.message);
                        isLoggingIn = false;
                    }
                }
            } catch (error) {
                alert("❌ Errore generale: " + error.message);
                isLoggingIn = false;
            }
        }

        // --- FUNZIONE DI SUPPORTO PER SCARICARE I DATI ---
        async function caricaEAvviaGioco(user) {
            utenteCorrenteId = user.uid;
            localStorage.setItem('giocatoreEmail', user.email);

            const docSnap = await getDoc(doc(db, "utenti", user.uid));
            if (docSnap.exists()) {
                const datiSito = docSnap.data();
                window.entraNelGioco(datiSito.nome, datiSito.genere, datiSito.xp, datiSito.livello, datiSito.monumenti);
            } else {
                const statoMonumenti = (typeof monumenti !== 'undefined') ? monumenti.map(m => ({ nome: m.nome, scoperto: false })) : [];
                await setDoc(doc(db, "utenti", user.uid), {
                    nome: "Esploratore",
                    genere: "Esploratore",
                    xp: 0,
                    livello: 1,
                    monumenti: statoMonumenti
                });
                window.entraNelGioco("Esploratore", "Esploratore", 0, 1, statoMonumenti);
            }
            isLoggingIn = false;
        }

        // --- CONTROLLO SESSIONE ATTIVA AL CARICAMENTO (UNIFICATO) ---
        window.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    if (user.emailVerified) {
                        caricaEAvviaGioco(user);
                    } else {
                        await auth.signOut();
                        document.getElementById('schermata-login').classList.remove('hidden');
                    }
                } else {
                    document.getElementById('schermata-login').classList.remove('hidden');
                }
            });
        });

        // --- ENTRA NEL GIOCO ---
        window.entraNelGioco = function(nome, genere, xp, livello, datiMonumenti) {
            document.getElementById('schermata-login').classList.add('hidden');
            
            document.getElementById('player-display-name').innerText = nome;
            document.getElementById('player-display-role').innerText = genere;
            document.getElementById('avatar-icon').innerText = (genere === "Esploratore") ? "🧑‍🚀" : "👩‍🚀";
            document.getElementById('livello-txt').innerText = livello;
            document.getElementById('xp-txt').innerText = xp;
            
            const percentuale = (xp / 300) * 100;
            document.getElementById('xp-bar').style.width = `${percentuale}%`;

            if (typeof playerXP !== 'undefined') playerXP = xp;
            if (typeof playerLevel !== 'undefined') playerLevel = livello;

            if (typeof monumenti !== 'undefined' && datiMonumenti) {
                monumenti.forEach(m => {
                    const salvato = datiMonumenti.find(s => s.nome === m.nome);
                    if (salvato) m.scoperto = salvato.scoperto;
                });
            }

            document.getElementById('btn-wishlist').classList.remove('hidden');

            if (typeof initGioco === 'function') {
                initGioco();
            }
        }

        // --- SALVATAGGIO CLOUD ---
        window.salvaProgressoSuCloud = async function(nuoviXp, nuovoLivello, listaMonumentiAggiornata) {
            if (!utenteCorrenteId) return;
            const statoMonumenti = listaMonumentiAggiornata.map(m => ({ nome: m.nome, scoperto: m.scoperto }));
            try {
                await updateDoc(doc(db, "utenti", utenteCorrenteId), {
                    xp: nuoviXp,
                    livello: nuovoLivello,
                    monumenti: statoMonumenti
                });
                console.log("☁️ Database Cloud Aggiornato!");
            } catch (error) {
                console.error("Errore sincro cloud:", error);
            }
        }

        // --- FUNZIONI DI INTERFACCIA ---
        window.toggleWishlist = function() {
            const sidebar = document.getElementById('wishlist-sidebar');
            sidebar.classList.toggle('translate-x-full');
        }

        window.apriPopupProfilo = function() {
            document.getElementById('edit-nome').value = document.getElementById('player-display-name').innerText;
            document.getElementById('edit-genere').value = document.getElementById('player-display-role').innerText;
            document.getElementById('popup-profilo').classList.remove('hidden');
        }

        window.chiudiPopupProfilo = function() {
            document.getElementById('popup-profilo').classList.add('hidden');
        }

        window.salvaModificheProfilo = async function() {
            const nuovoNome = document.getElementById('edit-nome').value.trim();
            const nuovoGenere = document.getElementById('edit-genere').value;
            
            if (nuovoNome.length < 3) {
                alert("Il nome deve contenere almeno 3 caratteri!");
                return;
            }

            if (utenteCorrenteId) {
                await updateDoc(doc(db, "utenti", utenteCorrenteId), {
                    nome: nuovoNome,
                    genere: nuovoGenere
                });
            }
            
            document.getElementById('player-display-name').innerText = nuovoNome;
            document.getElementById('player-display-role').innerText = nuovoGenere;
            document.getElementById('avatar-icon').innerText = (nuovoGenere === "Esploratore") ? "🧑‍🚀" : "👩‍🚀";
            
            chiudiPopupProfilo();
        }

        window.eseguiLogout = function() {
            auth.signOut().then(() => {
                localStorage.removeItem('giocatoreEmail');
                window.location.reload();
            });
        }
    </script>
</body>
</html>
